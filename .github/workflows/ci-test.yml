name: CI - Ejecutar Pruebas

on:
  pull_request:
    branches:
      - develop

jobs:

  pruebas:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Crear carpeta out
        run: mkdir -p out

      - name: Compilar
        run: javac -d out backend/src/*.java

      - name: Ejecutar pruebas
        run: java -cp out RegistroSolicitudTest
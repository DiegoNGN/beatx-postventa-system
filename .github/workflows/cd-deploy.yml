name: CD - Despliegue BeatX

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Crear carpeta out
        run: mkdir -p out

      - name: Compilar
        run: javac -d out backend/src/*.java

      - name: Simular despliegue
        run: |
          echo "================================"
          echo "Sistema BeatX desplegado"
          echo "Versión 1.0"
          echo "Módulo Postventa activo"
          echo "================================"